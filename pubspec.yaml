name: resee
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  http: ^1.2.1
  shared_preferences: ^2.2.3
  url_launcher: ^6.2.5
  file_picker: ^11.0.2
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/resee_app_icon.png
    - assets/images/resee_logo.png
    - assets/images/resee_wordmark_black.png